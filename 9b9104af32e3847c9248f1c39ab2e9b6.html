  };
  btns.appendChild(cancel);btns.appendChild(saveb);box.appendChild(btns);
  ov.appendChild(box);safeBackdropClose(ov);
  document.body.appendChild(ov);
}

function openPaidModal(p){
  const today="2026-06-18";
  const ov=el(`<div style="position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(4,6,9,.72);padding:16px"></div>`);
  const box=el(`<div style="width:100%;max-width:420px;border-radius:16px;padding:18px;background:linear-gradient(172deg,#26333F,#0C1016);border:1px solid var(--line);box-shadow:0 24px 60px -20px rgba(0,0,0,.9)"></div>`);
  box.appendChild(el(`<div class="lab" style="margin-bottom:3px">Mark paid</div>`));
  box.appendChild(el(`<div class="name" style="font-size:15px;margin-bottom:14px">${p[1]} &middot; #${p[2]} &middot; <span style="font-family:var(--mono)">${usd(p[3])}</span></div>`));
  box.appendChild(el(`<div class="lab" style="margin-bottom:4px">Date paid</div>`));
  const dt=el(`<input class="in date" type="date" value="${today}" style="width:100%;text-align:left;margin-bottom:13px">`);box.appendChild(dt);
  box.appendChild(el(`<div class="lab" style="margin-bottom:4px">Payment method</div>`));
  const me=el(`<select style="width:100%;max-width:none;margin-bottom:13px"><option>Check</option><option>Bank transfer</option><option>Amex</option></select>`);box.appendChild(me);
  box.appendChild(el(`<div class="lab" style="margin-bottom:4px">Notes</div>`));
  const nt=el(`<textarea placeholder="Check #, confirmation number, anything to remember" style="width:100%;min-height:64px;font-family:Inter,sans-serif;font-size:13px;color:var(--cream);background:rgba(4,6,9,.6);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:15px;resize:vertical;outline:none"></textarea>`);box.appendChild(nt);
  const btns=el(`<div style="display:flex;gap:8px;justify-content:flex-end"></div>`);
  const cancel=el(`<button class="btn ghost">Cancel</button>`);const saveb=el(`<button class="btn gold">Save payment</button>`);
  cancel.onclick=()=>ov.remove();
  saveb.onclick=async()=>{
    if(!S.paid)S.paid={};S.paid[p[0]]={date:dt.value||today,method:me.value,notes:nt.value||"",ts:Date.now(),cleared:false};
    save();ov.remove();render();
    if(typeof p[0]==="number"&&p[0]>0){const PM={"check":"check","bank transfer":"ach","amex":"other"};const pm=PM[(me.value||"").toLowerCase()]||"other";try{await apiPost("/payables/"+p[0]+"/mark-paid",{payment_method:pm,notes:(me.value?me.value+" — ":"")+(nt.value||""),job_name:p[9]||null});}catch(e){if(String(e.message)!=="auth")alert("Marked paid here, but couldn't record it in the database — check your connection.");}}
  };
  btns.appendChild(cancel);btns.appendChild(saveb);box.appendChild(btns);
  ov.appendChild(box);safeBackdropClose(ov);
  document.body.appendChild(ov);
}

function vNotCleared(v){
  if(!S.paid)S.paid={};
  const items=PAY.filter(p=>S.paid[p[0]]&&!S.paid[p[0]].cleared).map(p=>({p,info:S.paid[p[0]]})).sort((a,b)=>(b.info.ts||0)-(a.info.ts||0));
  const tot=items.reduce((s,it)=>s+it.p[3],0);
  v.appendChild(el(`<div class="stats"><div class="stat al"><div class="v">${usd(tot)}</div><div class="l">In flight &middot; still counts against the balance</div></div><div class="stat"><div class="v">${items.length}</div><div class="l">Awaiting clearance</div></div></div>`));
  v.appendChild(el(`<div class="banner">Paid, but not yet posted at the bank — so still subtracted from your real balance. When one clears in <b>Main Street Bank</b>, tap <b>Cleared</b>, and update <b>Bank cash</b> on Overview to the bank's live figure.</div>`));
  if(!items.length){v.appendChild(el(`<div class="card"><div class="row" style="border-top:none"><span class="sm">Nothing in flight. When you mark a bill paid, it lands here until it clears the bank.</span></div></div>`));return;}
  const c=el(`<div class="card"><div class="row" style="border-top:none"><span class="lab" style="flex:1">Vendor / Invoice</span><span class="lab" style="width:120px">Paid</span><span class="lab" style="width:90px;text-align:right">Amount</span><span style="width:150px"></span></div></div>`);
  items.forEach(({p,info})=>{
    const d=info.date?new Date(info.date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—";
    const row=el(`<div class="row" style="align-items:flex-start"></div>`);
    row.appendChild(el(`<div style="flex:1;min-width:150px"><div class="name">${p[1]} &middot; #${p[2]}</div>${info.notes?`<div class="sm" style="margin-top:2px">${info.notes}</div>`:""}</div>`));
    row.appendChild(el(`<div style="width:120px"><div class="sm" style="color:var(--cream)">${d}</div><span class="tag t-on" style="margin-top:3px;display:inline-block">${info.method||""}</span></div>`));
    row.appendChild(el(`<span class="amt" style="width:90px;text-align:right">${usd(p[3])}</span>`));
    const acts=el(`<div style="width:150px;display:flex;gap:6px;justify-content:flex-end"></div>`);
    const clr=el(`<button class="btn gold" style="padding:6px 12px">Cleared</button>`);
    clr.onclick=()=>{S.paid[p[0]].cleared=true;S.paid[p[0]].clearedTs=Date.now();save();render();};
    const undo=el(`<button class="btn ghost" style="width:34px;padding:6px 0" title="Undo \u2014 back to open/unpaid">\u21A9</button>`);
    undo.onclick=()=>{if(confirm(`Move ${p[1]} #${p[2]} (${usd(p[3])}) back to open/unpaid? This removes the payment record.`)){delete S.paid[p[0]];save();render();}};
    acts.appendChild(clr);acts.appendChild(undo);
    row.appendChild(acts);
    c.appendChild(row);
  });
  v.appendChild(c);
}
function vPaid(v){
  if(!S.paid)S.paid={};
  const items=PAY.filter(p=>S.paid[p[0]]&&S.paid[p[0]].cleared).map(p=>({p,info:S.paid[p[0]]})).sort((a,b)=>((b.info.clearedTs||b.info.ts)||0)-((a.info.clearedTs||a.info.ts)||0));
  if(!items.length){v.appendChild(el(`<div class="card"><div class="row" style="border-top:none"><span class="sm">No cleared payments yet. When a payment posts at the bank, tap <b style="color:var(--gold)">Cleared</b> on the Not Yet Cleared card and it lands here.</span></div></div>`));return;}
  const c=el(`<div class="card"><div class="row" style="border-top:none"><span class="lab" style="flex:1">Vendor / Invoice</span><span class="lab" style="width:150px">Cleared</span><span class="lab" style="width:90px;text-align:right">Amount</span><span style="width:34px"></span></div></div>`);
  items.forEach(({p,info})=>{
    const d=info.date?new Date(info.date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
    const row=el(`<div class="row" style="align-items:flex-start"></div>`);
    row.appendChild(el(`<div style="flex:1;min-width:150px"><div class="name">${p[1]} &middot; #${p[2]}</div>${info.notes?`<div class="sm" style="margin-top:2px">${info.notes}</div>`:""}</div>`));
    row.appendChild(el(`<div style="width:150px"><div class="sm" style="color:var(--cream)">${d}</div><span class="tag t-on" style="margin-top:3px;display:inline-block">${info.method||""} &middot; cleared</span></div>`));
    row.appendChild(el(`<span class="amt" style="width:90px;text-align:right">${usd(p[3])}</span>`));
    const undo=el(`<button class="btn ghost" style="width:34px;padding:6px 0" title="Not cleared after all \u2014 move back">\u21A9</button>`);
    undo.onclick=()=>{if(confirm(`Move ${p[1]} #${p[2]} (${usd(p[3])}) back to Not Yet Cleared? It will count against the balance again.`)){S.paid[p[0]].cleared=false;save();render();}};
    row.appendChild(undo);
    c.appendChild(row);
  });
  v.appendChild(c);
  v.appendChild(el(`<div class="note">Your running record of payments that have posted at the bank. These no longer affect the real balance — your live Bank cash figure already reflects them. Use &#8617; if one was marked cleared by mistake.</div>`));
}

const SECTIONS=[["dash","Overview",vDash],["recvt","Receivables",vRecvT],["rec","Recurring",vRec],["sub","Subcontractors",vSub],["mat","Materials",vMat],["vend","Vendor Accounts",vVend],["clr","Not Yet Cleared",vNotCleared],["paid","Running Payments",vPaid]];
const ICONS={
  dash:'<rect x="4" y="13" width="4" height="7" rx="1"></rect><rect x="10" y="9" width="4" height="11" rx="1"></rect><rect x="16" y="4" width="4" height="16" rx="1"></rect>',
  recvt:'<path d="M12 3v9"></path><path d="M8.5 9.5L12 13l3.5-3.5"></path><path d="M4 15v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4"></path>',
  rec:'<path d="M4 9a7 7 0 0 1 12-3l2 2"></path><path d="M18 4v4h-4"></path><path d="M20 15a7 7 0 0 1-12 3l-2-2"></path><path d="M6 20v-4h4"></path>',
  sub:'<circle cx="12" cy="8" r="3.4"></circle><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"></path>',
  mat:'<path d="M4 7l8-3.5L20 7v10l-8 3.5L4 17z"></path><path d="M4 7l8 3.5L20 7M12 10.5V20"></path>',
  vend:'<path d="M4 9.5l8-5 8 5"></path><path d="M5 9.5V19M9.5 9.5V19M14.5 9.5V19M19 9.5V19"></path><path d="M3.5 19.5h17"></path>',
  paid:'<path d="M5 4h14v16l-2.5-1.6L14 20l-2-1.6L10 20l-2.5-1.6L5 20z"></path><path d="M9 9.5l2 2 4-4.5"></path>',
  clr:'<circle cx="12" cy="12" r="8.5"></circle><path d="M12 7.5V12l3 1.7"></path>'
};
function liveT(t){return PAY.filter(p=>p[6]===t&&!(S.pd&&S.pd[p[0]])&&!(S.paid&&S.paid[p[0]])).reduce((s,p)=>s+p[3],0);}
function secValue(k){
  if(k==="dash")return usd(real());
  if(k==="recvt")return usd(recvOn());
  if(k==="rec")return usd(auto10());
  if(k==="sub")return usd(liveT("sub"));
  if(k==="mat")return usd(liveT("mat"));
  if(k==="vend")return usd(vendOn());
  if(k==="clr")return usd(paidNotCleared());
  if(k==="paid")return "";
  return "";
}
function metaLabel(k){return {dash:"REAL BALANCE",recvt:"TOGGLED ON",rec:"TOGGLED ON",sub:"OPEN",mat:"OPEN",vend:"TOGGLED ON",clr:"IN FLIGHT",paid:""}[k]||"";}
function secBadge(k){
  if(k==="sub"||k==="mat"){const od=PAY.filter(p=>p[6]===k&&p[5]&&!(S.pd&&S.pd[p[0]])&&!(S.paid&&S.paid[p[0]])).length;return od?`<span class="tbadge">${od} overdue</span>`:"";}
  return "";
}
function openSec(k){S.view=k;save();render();window.scrollTo({top:0,behavior:"smooth"});}
function goHome(){S.view="home";save();render();window.scrollTo({top:0,behavior:"smooth"});}
function renderHomeTile(k,label){
  const span=(k==="dash");
  const t=el(`<div class="t tile ${span?"spanfull":""}" id="home-${k}"></div>`);
  if(k==="dash"){
    const totRecv=(S.rl||[]).reduce((s,r)=>s+(r.amt||0),0);
    const owe=liveT("sub")+liveT("mat")+vendOn();
    t.innerHTML=`<span class="klass">instrument</span><div class="ic"><svg viewBox="0 0 24 24">${ICONS.dash}</svg></div><div class="ttl">Overview</div>
      <div class="fmgrid wide">
        <div class="fm"><div class="mlab">Bank cash</div><div class="tnum tgold">${usd(S.bank)}</div></div>
        <div class="fm alt"><div class="mlab">Owed to us</div><div class="tnum">${usd(totRecv)}</div></div>
        <div class="fm alt"><div class="mlab">We owe (open)</div><div class="tnum">${usd(owe)}</div></div>
        <div class="fm"><div class="mlab">Real balance</div><div class="tnum tgold">${usd(real())}</div></div>
      </div>`;
  } else {
    t.innerHTML=`<span class="klass">tap to open</span><div class="ic"><svg viewBox="0 0 24 24">${ICONS[k]||""}</svg></div><div class="ttl">${label}</div><div class="tmeta"><span class="tnum tgold">${secValue(k)}</span><span class="mlab">${metaLabel(k)}</span>${secBadge(k)}</div>`;
  }
  t.onclick=()=>openSec(k);
  return t;
}
function render(){
  const rb=real();
  const tb=document.getElementById("topbal");if(tb){tb.textContent=usd(rb);tb.className="bal"+(rb<0?" neg":"");}
  if(!S.view)S.view="home";
  const hb=document.getElementById("homebtn");if(hb)hb.style.display=(S.view==="home")?"none":"inline-block";
  const v=document.getElementById("view");v.innerHTML="";
  if(S.view==="home"){
    const grid=el(`<div class="grid"></div>`);
    SECTIONS.forEach(([k,label])=>grid.appendChild(renderHomeTile(k,label)));
    v.appendChild(grid);
    return;
  }
  const def=SECTIONS.find(s=>s[0]===S.view)||SECTIONS[0];
  const k=def[0],label=def[1],fn=def[2];
  const wrap=el(`<div class="secview"></div>`);
  const bar=el(`<div class="secbar"></div>`);
  bar.appendChild(el(`<div class="ic"><svg viewBox="0 0 24 24">${ICONS[k]||""}</svg></div>`));
  bar.appendChild(el(`<div class="ttl">${label}</div>`));
  wrap.appendChild(bar);
  const body=el(`<div class="tbody"></div>`);fn(body);wrap.appendChild(body);
  v.appendChild(wrap);
}
function tick(){const n=new Date();const ds=document.getElementById("dstr"),ck=document.getElementById("clk");
  if(ds)ds.textContent=n.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase().replace(",","");
  if(ck)ck.textContent=n.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}
setInterval(tick,1000);tick();
load();
</script>
