<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f3f4f6; }
        .card { background: white; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .spinner { border: 4px solid #e5e7eb; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #6b7280; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <p>Completing connection, please wait...</p>
    </div>
    <script>
        // Relay OAuth callback from GitHub Pages (HTTPS) to the backend API.
        // Intuit requires HTTPS redirect URIs for production apps.
        // This page receives the auth code and forwards it to the API server.
        const params = window.location.search;
        if (params) {
            // Use production API by default; fall back to localhost for local dev
            const API_BASE = 'http://45.55.159.91:8000';
            window.location.href = API_BASE + '/api/v1/quickbooks/callback' + params;
        } else {
            document.querySelector('p').textContent = 'Error: No authorization parameters received.';
        }
    </script>
</body>
</html>
